<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Roll DAW - Refined</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tone.js para el motor de audio -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <!-- Iconos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .grid-bg {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, #1a1a1a 1px, transparent 1px),
                linear-gradient(to bottom, #1a1a1a 1px, transparent 1px);
        }
        .custom-scroll::-webkit-scrollbar {
            height: 6px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 3px;
        }
    </style>
</head>
<body class="bg-black text-zinc-200 h-screen flex flex-col justify-center items-center overflow-hidden font-sans select-none">

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="w-11/12 max-w-5xl h-[80vh] bg-[#0c0c0e] border border-zinc-900 rounded-xl shadow-2xl flex flex-col overflow-hidden">
        
        <!-- BARRA DE CONTROL -->
        <div class="bg-[#121214] border-b border-zinc-900 p-4 flex items-center justify-between gap-4 z-50">
            
            <!-- Controles de Transporte (Play/Pause/Restart) -->
            <div class="flex items-center gap-2">
                <button id="btn-restart" class="p-2 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-lg transition" title="Reiniciar al inicio">
                    <i data-lucide="rotate-ccw" class="w-4 h-4 text-white"></i>
                </button>
                <button id="btn-play" class="p-2 bg-white hover:bg-zinc-200 text-black rounded-lg transition" title="Play / Pause">
                    <i data-lucide="play" class="w-4 h-4 fill-black"></i>
                </button>
            </div>

            <!-- Controles de Zoom -->
            <div class="flex items-center gap-1 bg-zinc-900 p-1 rounded-lg border border-zinc-800">
                <button id="btn-zoom-out" class="p-1.5 hover:bg-zinc-800 rounded text-zinc-400 hover:text-white transition" title="Alejar Zoom">
                    <i data-lucide="zoom-out" class="w-4 h-4"></i>
                </button>
                <span id="txt-zoom" class="text-[10px] font-mono text-zinc-500 px-1 min-w-[35px] text-center">30%</span>
                <button id="btn-zoom-in" class="p-1.5 hover:bg-zinc-800 rounded text-zinc-400 hover:text-white transition" title="Acercar Zoom">
                    <i data-lucide="zoom-in" class="w-4 h-4"></i>
                </button>
            </div>

            <!-- Ajuste de Tempo (BPM) -->
            <div class="flex items-center gap-3 bg-zinc-900 px-3 py-1.5 rounded-lg border border-zinc-800">
                <span class="text-xs font-semibold uppercase tracking-wider text-zinc-500">Tempo</span>
                <input id="input-bpm" type="number" value="120" min="60" max="200" class="w-12 bg-transparent text-white font-mono font-bold focus:outline-none text-center text-md">
                <span class="text-xs text-zinc-600 font-bold">BPM</span>
            </div>

            <!-- Input de Importar Archivo -->
            <div>
                <label for="audio-upload" class="flex items-center gap-2 px-4 py-2 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 hover:border-zinc-700 rounded-lg cursor-pointer text-sm font-medium transition text-white">
                    <i data-lucide="upload" class="w-4 h-4"></i>
                    Importar Audio
                </label>
                <input id="audio-upload" type="file" accept="audio/*" class="hidden">
            </div>
        </div>

        <!-- AREA DEL PIANO ROLL / TIMELINE -->
        <div class="flex-1 relative bg-[#060607] overflow-x-auto overflow-y-hidden grid-bg custom-scroll" id="timeline-container">
            
            <!-- Lienzo Dinámico Expandible -->
            <div id="timeline-stretch" class="absolute inset-y-0 left-0 w-[60000px] pointer-events-none">
                <!-- Línea de reproducción (Playhead) -->
                <div id="playhead" class="absolute top-0 bottom-0 w-[1.5px] bg-white shadow-[0_0_8px_rgba(255,255,255,0.8)] z-30 left-0"></div>
            </div>

            <!-- CONTENEDOR DEL SAMPLE -->
            <div id="workspace" class="absolute inset-y-0 left-0 w-[60000px] z-20"></div>
        </div>
    </div>

    <!-- AUDIO & UI SCRIPT -->
    <script>
        lucide.createIcons();

        const btnPlay = document.getElementById('btn-play');
        const btnRestart = document.getElementById('btn-restart');
        const btnZoomIn = document.getElementById('btn-zoom-in');
        const btnZoomOut = document.getElementById('btn-zoom-out');
        const txtZoom = document.getElementById('txt-zoom');
        const inputBpm = document.getElementById('input-bpm');
        const audioUpload = document.getElementById('audio-upload');
        const workspace = document.getElementById('workspace');
        const playhead = document.getElementById('playhead');
        const timelineContainer = document.getElementById('timeline-container');

        let audioBuffer = null;
        let player = null;
        let sampleBlock = null;
        
        let isDragging = false;
        let startX = 0;
        let blockLeft = 40; 
        
        // ZOOM CONFIGURADO DE ENTRADA A 30%
        let currentZoomLevel = 0.3;
        const basePixelsPerSecond = 100;
        let pixelsPerSecond = basePixelsPerSecond * currentZoomLevel;

        // 1. GESTIÓN DEL TEMPO
        Tone.Transport.bpm.value = 120;
        inputBpm.addEventListener('change', (e) => {
            let bpm = Math.max(60, Math.min(200, Number(e.target.value)));
            e.target.value = bpm;
            Tone.Transport.bpm.value = bpm;
        });

        // 2. IMPORTAR AUDIO
        audioUpload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                audioBuffer = await Tone.getContext().decodeAudioData(arrayBuffer);
                
                if (player) player.dispose();
                player = new Tone.Player(audioBuffer).toDestination();

                actualizarLienzoYBloque(file.name);
            } catch (error) {
                console.error("Error cargando el archivo:", error);
            }
        });

        // 3. ACTUALIZACIÓN POR ZOOM Y ALTO ESTILIZADO
        function actualizarLienzoYBloque(fileName) {
            if (!audioBuffer) return;

            let duracion = Math.min(audioBuffer.duration, 600);
            const blockWidth = duracion * pixelsPerSecond;

            if (!sampleBlock) {
                sampleBlock = document.createElement('div');
                // CAMBIO VISUAL: h-16 (más delgado) y top-10 (más arriba en el timeline)
                sampleBlock.className = "absolute top-10 h-16 bg-[#121214] border border-zinc-800 rounded-md shadow-lg cursor-grab flex flex-col justify-between overflow-hidden transition-colors duration-150";
                
                const canvas = document.createElement('canvas');
                canvas.id = "waveform-canvas";
                canvas.className = "absolute inset-0 w-full h-full opacity-90 pointer-events-none";
                
                const label = document.createElement('div');
                label.id = "waveform-label";
                label.className = "relative z-10 p-1 text-[9px] font-mono tracking-wider text-zinc-400 bg-black/40 flex items-center gap-1 border-b border-zinc-900/40 backdrop-blur-sm pointer-events-none truncate";
                
                sampleBlock.appendChild(canvas);
                sampleBlock.appendChild(label);
                workspace.appendChild(sampleBlock);

                sampleBlock.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    sampleBlock.classList.replace('cursor-grab', 'cursor-grabbing');
                    sampleBlock.classList.replace('border-zinc-800', 'border-zinc-500');
                    const rect = sampleBlock.getBoundingClientRect();
                    startX = e.clientX - rect.left;
                    e.stopPropagation();
                });
            }

            sampleBlock.style.width = `${blockWidth}px`;
            sampleBlock.style.left = `${blockLeft}px`;
            
            const label = document.getElementById('waveform-label');
            label.innerHTML = `<i data-lucide="music" class="w-2.5 h-2.5 text-white"></i> ${fileName.toUpperCase()}`;
            lucide.createIcons();

            const canvas = document.getElementById('waveform-canvas');
            renderizarOndaHD(audioBuffer, canvas);
            
            sincronizarAudioConLinea();
        }

        function renderizarOndaHD(buffer, canvas) {
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);

            const datosAudio = buffer.getChannelData(0);
            const totalMuestras = datosAudio.length;
            const anchoLienzo = rect.width;
            const altoLienzo = rect.height;
            
            const anchoBarra = 2;
            const espacio = 1;
            const totalBarras = Math.floor(anchoLienzo / (anchoBarra + espacio));
            const pasoMuestra = Math.floor(totalMuestras / totalBarras);
            const medioAlto = altoLienzo / 2;

            ctx.clearRect(0, 0, anchoLienzo, altoLienzo);
            ctx.fillStyle = '#ffffff';

            for (let i = 0; i < totalBarras; i++) {
                let inicioMuestra = i * pasoMuestra;
                let maximoValor = 0;
                
                for (let j = 0; j < pasoMuestra; j++) {
                    const valorActual = Math.abs(datosAudio[inicioMuestra + j]);
                    if (valorActual > maximoValor) maximoValor = valorActual;
                }

                const altoBarra = maximoValor * medioAlto * 0.9;
                const x = i * (anchoBarra + espacio);
                ctx.fillRect(x, medioAlto - altoBarra, anchoBarra, altoBarra * 2);
            }
        }

        // 4. SISTEMA DE ZOOM
        function cambiarZoom(delta) {
            currentZoomLevel = Math.max(0.1, Math.min(4.0, currentZoomLevel + delta));
            pixelsPerSecond = basePixelsPerSecond * currentZoomLevel;
            txtZoom.innerText = `${Math.round(currentZoomLevel * 100)}%`;
            
            if (audioUpload.files[0] && audioBuffer) {
                actualizarLienzoYBloque(audioUpload.files[0].name);
            }
        }

        btnZoomIn.addEventListener('click', () => cambiarZoom(0.1));
        btnZoomOut.addEventListener('click', () => cambiarZoom(-0.1));

        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === 'ArrowUp' || e.key === '=')) {
                e.preventDefault();
                cambiarZoom(0.1);
            }
            if (e.ctrlKey && (e.key === 'ArrowDown' || e.key === '-')) {
                e.preventDefault();
                cambiarZoom(-0.1);
            }
        });

        timelineContainer.addEventListener('wheel', (e) => {
            if (e.ctrlKey) {
                e.preventDefault();
                cambiarZoom(e.deltaY < 0 ? 0.1 : -0.1);
            }
        }, { passive: false });


        // 5. MOVIMIENTO DEL BLOQUE
        window.addEventListener('mousemove', (e) => {
            if (!isDragging || !sampleBlock) return;
            
            const containerRect = timelineContainer.getBoundingClientRect();
            let newLeft = e.clientX - containerRect.left - startX + timelineContainer.scrollLeft;
            if (newLeft < 0) newLeft = 0;
            
            blockLeft = newLeft;
            sampleBlock.style.left = `${blockLeft}px`;
            
            sincronizarAudioConLinea();
        });

        window.addEventListener('mouseup', () => {
            if (isDragging && sampleBlock) {
                isDragging = false;
                sampleBlock.classList.replace('cursor-grabbing', 'cursor-grab');
                sampleBlock.classList.replace('border-zinc-500', 'border-zinc-800');
            }
        });

        // 6. CONTROLADOR DE REPRODUCCIÓN (CORRECCIÓN DE PAUSA)
        function sincronizarAudioConLinea() {
            if (!player) return;
            Tone.Transport.cancel();
            
            const tiempoInicioSg = blockLeft / pixelsPerSecond;
            
            Tone.Transport.schedule((time) => {
                // Solo dispara el play si el Transport arrancó antes o exactamente en el punto
                player.start(time);
            }, tiempoInicioSg);
        }

        function actualizarPlayhead() {
            if (Tone.Transport.state === "started") {
                const currentLeft = Tone.Transport.seconds * pixelsPerSecond;
                playhead.style.left = `${currentLeft}px`;
                
                const rangoVisible = timelineContainer.scrollLeft + timelineContainer.clientWidth;
                if (currentLeft > rangoVisible - 50) {
                    timelineContainer.scrollLeft = currentLeft - 100;
                }
            }
            requestAnimationFrame(actualizarPlayhead);
        }
        requestAnimationFrame(actualizarPlayhead);

        // PLAY / PAUSA REAL CON CORRECCIÓN DE AUDIO
        btnPlay.addEventListener('click', async () => {
            await Tone.start();
            if (Tone.Transport.state !== "started") {
                Tone.Transport.start();
                // Si la línea ya pasó el bloque al darle play, reproducimos el audio desde el offset correcto
                const tiempoInicioSg = blockLeft / pixelsPerSecond;
                if (Tone.Transport.seconds > tiempoInicioSg && Tone.Transport.seconds < tiempoInicioSg + audioBuffer.duration) {
                    const offset = Tone.Transport.seconds - tiempoInicioSg;
                    player.start(Tone.now(), offset);
                }
                btnPlay.innerHTML = `<i data-lucide="pause" class="w-4 h-4 text-black fill-black"></i>`;
            } else {
                Tone.Transport.pause();
                if (player) player.stop(); // ARREGLADO: Detiene el audio inmediatamente al pausar
                btnPlay.innerHTML = `<i data-lucide="play" class="w-4 h-4 text-black fill-black"></i>`;
            }
            lucide.createIcons();
        });

        // RESTART
        btnRestart.addEventListener('click', () => {
            Tone.Transport.stop();
            if (player) player.stop();
            playhead.style.left = "0px";
            Tone.Transport.seconds = 0;
            timelineContainer.scrollLeft = 0;
            btnPlay.innerHTML = `<i data-lucide="play" class="w-4 h-4 text-black fill-black"></i>`;
            lucide.createIcons();
        });
    </script>
</body>
</html>
