<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Roll DAW - Multi-track Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Líneas divisorias verticales basadas en el zoom */
        .vertical-grid {
            background-size: var(--grid-width, 30px) 100%;
            background-image: linear-gradient(to right, #1f1f23 1px, transparent 1px);
        }
        .custom-scroll::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 0px;
        }
    </style>
</head>
<body class="bg-black text-zinc-200 h-screen flex flex-col justify-center items-center overflow-hidden font-sans select-none">

    <div class="w-11/12 max-w-5xl h-[80vh] bg-[#0c0c0e] border border-zinc-900 rounded-none shadow-2xl flex flex-col overflow-hidden">
        
        <div class="bg-[#121214] border-b border-zinc-900 p-4 flex items-center justify-between gap-4 z-50">
            
            <div class="flex items-center gap-2">
                <button id="btn-restart" class="p-2 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-none transition" title="Reiniciar al inicio">
                    <i data-lucide="rotate-ccw" class="w-4 h-4 text-white"></i>
                </button>
                <button id="btn-play" class="p-2 bg-white hover:bg-zinc-200 text-black rounded-none transition" title="Play / Pause">
                    <i data-lucide="play" class="w-4 h-4 fill-black"></i>
                </button>
            </div>

            <div class="flex items-center gap-1 bg-zinc-900 p-1 rounded-none border border-zinc-800">
                <button id="btn-zoom-out" class="p-1.5 hover:bg-zinc-800 rounded-none text-zinc-400 hover:text-white transition" title="Alejar Zoom">
                    <i data-lucide="zoom-out" class="w-4 h-4"></i>
                </button>
                <span id="txt-zoom" class="text-[10px] font-mono text-zinc-500 px-1 min-w-[35px] text-center">30%</span>
                <button id="btn-zoom-in" class="p-1.5 hover:bg-zinc-800 rounded-none text-zinc-400 hover:text-white transition" title="Acercar Zoom">
                    <i data-lucide="zoom-in" class="w-4 h-4"></i>
                </button>
            </div>

            <div class="flex items-center gap-3 bg-zinc-900 px-3 py-1.5 rounded-none border border-zinc-800">
                <span class="text-xs font-semibold uppercase tracking-wider text-zinc-500">Tempo</span>
                <input id="input-bpm" type="number" value="120" min="60" max="200" class="w-12 bg-transparent text-white font-mono font-bold focus:outline-none text-center text-md">
                <span class="text-xs text-zinc-600 font-bold">BPM</span>
            </div>

            <div>
                <label for="audio-upload" class="flex items-center gap-2 px-4 py-2 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 hover:border-zinc-700 rounded-none cursor-pointer text-sm font-medium transition text-white">
                    <i data-lucide="upload" class="w-4 h-4"></i>
                    Importar Audio
                </label>
                <input id="audio-upload" type="file" accept="audio/*" class="hidden">
            </div>
        </div>

        <div id="ruler-container" class="w-full bg-[#101012] border-b border-zinc-900 h-8 overflow-hidden relative text-[10px] font-mono text-zinc-500 select-none">
            <div id="time-ruler" class="absolute inset-y-0 left-0 w-[60000px] h-full vertical-grid flex items-end pb-1">
                </div>
        </div>

        <div class="flex-1 relative bg-[#060607] overflow-auto vertical-grid custom-scroll" id="timeline-container">
            
            <div id="timeline-stretch" class="absolute inset-y-0 left-0 w-[60000px] pointer-events-none">
                <div id="playhead" class="absolute top-0 bottom-0 w-[1.5px] bg-white shadow-[0_0_8px_rgba(255,255,255,0.8)] z-30 left-0"></div>
            </div>

            <div id="tracks-container" class="absolute top-0 left-0 w-[60000px] flex flex-col pt-2 gap-3 pointer-events-none">
                </div>
        </div>
    </div>

    <script>
        Tone.getContext().lookAhead = 0; 
        Tone.getContext().latencyHint = "interactive";

        lucide.createIcons();

        const btnPlay = document.getElementById('btn-play');
        const btnRestart = document.getElementById('btn-restart');
        const btnZoomIn = document.getElementById('btn-zoom-in');
        const btnZoomOut = document.getElementById('btn-zoom-out');
        const txtZoom = document.getElementById('txt-zoom');
        const inputBpm = document.getElementById('input-bpm');
        const audioUpload = document.getElementById('audio-upload');
        const timeRuler = document.getElementById('time-ruler');
        const tracksContainer = document.getElementById('tracks-container');
        const playhead = document.getElementById('playhead');
        const timelineContainer = document.getElementById('timeline-container');
        const rulerContainer = document.getElementById('ruler-container');

        let tracksList = []; // Lista de renglones/tracks creados
        let blocksList = []; // Todos los fragmentos de audio en el DAW
        let selectedBlockId = null;
        let blockIdCounter = 0;
        
        let isDragging = false;
        let isMovingPlayhead = false;
        let startX = 0;
        let draggedBlockData = null;
        
        let currentZoomLevel = 0.3;
        const basePixelsPerSecond = 100;
        let pixelsPerSecond = basePixelsPerSecond * currentZoomLevel;

        // Ajustar cuadrícula visual
        document.documentElement.style.setProperty('--grid-width', `${pixelsPerSecond}px`);

        // Sincronizar el scroll horizontal de la barra de números con el trackpad
        timelineContainer.addEventListener('scroll', () => {
            rulerContainer.scrollLeft = timelineContainer.scrollLeft;
        });

        // GESTIÓN DEL TEMPO
        Tone.Transport.bpm.value = 120;
        inputBpm.addEventListener('change', (e) => {
            let bpm = Math.max(60, Math.min(200, Number(e.target.value)));
            e.target.value = bpm;
            Tone.Transport.bpm.value = bpm;
        });

        // GENERAR LOS NÚMEROS DE LA REGLA SUPERIOR (1, 2, 3...)
        function dibujarReglaDeTiempo() {
            timeRuler.innerHTML = '';
            // Crear marcas numéricas para los primeros 200 segundos/compases
            for (let i = 0; i < 200; i++) {
                const marker = document.createElement('div');
                marker.className = "absolute border-l border-zinc-700 h-3 flex items-start pl-1";
                marker.style.left = `${i * pixelsPerSecond}px`;
                marker.innerText = i + 1;
                timeRuler.appendChild(marker);
            }
        }
        dibujarReglaDeTiempo();

        // IMPORTAR AUDIO (CREA NUEVO RENGLÓN ABAJO)
        audioUpload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const freshBuffer = await Tone.getContext().decodeAudioData(arrayBuffer);
                const fileName = file.name.toUpperCase();

                // 1. Crear un nuevo renglón (Pista) visual abajo
                const trackId = tracksList.length;
                const trackRow = document.createElement('div');
                trackRow.className = "w-full h-16 bg-zinc-950/20 border-y border-zinc-900/40 relative pointer-events-auto";
                trackRow.setAttribute('data-track-id', trackId);
                tracksContainer.appendChild(trackRow);
                
                tracksList.push({ id: trackId, domRow: trackRow });

                // 2. Instanciar el bloque de audio en este nuevo renglón vacío (Posición inicial en 0 segundos)
                crearNuevoBloque(0, 0, freshBuffer.duration, trackId, freshBuffer, fileName);
            } catch (error) {
                console.error("Error cargando el archivo:", error);
            }
        });

        // CREAR BLOQUE EN UN RENGLÓN ESPECÍFICO
        function crearNuevoBloque(posX, startTime, endTime, trackId, buffer, name) {
            const id = blockIdCounter++;
            const duration = endTime - startTime;
            const blockWidth = duration * pixelsPerSecond;

            const dom = document.createElement('div');
            dom.className = "absolute top-0 h-full bg-[#121214] border border-zinc-800 rounded-none shadow-md cursor-grab flex flex-col justify-between overflow-hidden z-20";
            dom.style.width = `${blockWidth}px`;
            dom.style.left = `${posX}px`;
            dom.setAttribute('data-id', id);

            const canvas = document.createElement('canvas');
            canvas.className = "absolute inset-0 w-full h-full opacity-90 pointer-events-none";
            
            const label = document.createElement('div');
            label.className = "relative z-10 p-1 text-[8px] font-mono tracking-wider text-zinc-400 bg-black/40 flex items-center gap-1 border-b border-zinc-900/40 backdrop-blur-sm pointer-events-none truncate";
            label.innerHTML = `<i data-lucide="music" class="w-2.5 h-2.5 text-white"></i> ${name}`;

            dom.appendChild(canvas);
            dom.appendChild(label);
            
            // Meter el bloque dentro del renglón correspondiente
            const targetRow = tracksList[trackId].domRow;
            targetRow.appendChild(dom);
            lucide.createIcons();

            const player = new Tone.Player({ url: buffer, sync: false }).toDestination();

            const blockObject = {
                id: id,
                trackId: trackId,
                domElement: dom,
                canvasElement: canvas,
                player: player,
                buffer: buffer,
                fileName: name,
                leftX: posX,
                audioStart: startTime,
                audioEnd: endTime,
                audioDuration: duration
            };

            blocksList.push(blockObject);

            dom.addEventListener('mousedown', (e) => {
                seleccionarBloque(id);
                isDragging = true;
                dom.classList.replace('cursor-grab', 'cursor-grabbing');
                
                const rect = dom.getBoundingClientRect();
                startX = e.clientX - rect.left;
                draggedBlockData = blockObject;
                e.stopPropagation(); 
            });

            canvas.style.width = `${blockWidth}px`;
            requestAnimationFrame(() => {
                renderizarSeccionOndaHD(blockObject);
            });

            reprogramarSecuenciadorGlobal();
            seleccionarBloque(id);
        }

        // SELECCIÓN
        function seleccionarBloque(id) {
            selectedBlockId = id;
            blocksList.forEach(b => {
                if (b.id === id) {
                    b.domElement.classList.remove('border-zinc-800');
                    b.domElement.classList.add('border-white', 'shadow-[0_0_12px_rgba(255,255,255,0.2)]');
                } else {
                    b.domElement.classList.remove('border-white', 'shadow-[0_0_12px_rgba(255,255,255,0.2)]');
                    b.domElement.classList.add('border-zinc-800');
                }
            });
        }

        function deseleccionarTodo() {
            selectedBlockId = null;
            blocksList.forEach(b => {
                b.domElement.classList.remove('border-white', 'shadow-[0_0_12px_rgba(255,255,255,0.2)]');
                b.domElement.classList.add('border-zinc-800');
            });
        }

        // DIBUJAR ONDA HD
        function renderizarSeccionOndaHD(block) {
            const canvas = block.canvasElement;
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const width = block.audioDuration * pixelsPerSecond;
            const altoLienzo = 64;

            canvas.width = width * dpr;
            canvas.height = altoLienzo * dpr;
            ctx.scale(dpr, dpr);

            const datosAudio = block.buffer.getChannelData(0);
            const totalMuestrasGlobales = datosAudio.length;

            const muestraInicio = Math.floor((block.audioStart / block.buffer.duration) * totalMuestrasGlobales);
            const muestraFin = Math.floor((block.audioEnd / block.buffer.duration) * totalMuestrasGlobales);
            const totalMuestrasBloque = muestraFin - muestraInicio;

            const anchoBarra = 2;
            const espacio = 1;
            const totalBarras = Math.floor(width / (anchoBarra + espacio));
            const pasoMuestra = Math.floor(totalMuestrasBloque / totalBarras) || 1;
            const medioAlto = altoLienzo / 2;

            ctx.clearRect(0, 0, width, altoLienzo);
            ctx.fillStyle = '#ffffff';

            for (let i = 0; i < totalBarras; i++) {
                let inicioMuestra = muestraInicio + (i * pasoMuestra);
                let maximoValor = 0;
                
                for (let j = 0; j < pasoMuestra; j++) {
                    if (inicioMuestra + j >= totalMuestrasGlobales) break;
                    const valorActual = Math.abs(datosAudio[inicioMuestra + j]);
                    if (valorActual > maximoValor) maximoValor = valorActual;
                }

                const altoBarra = maximoValor * medioAlto * 0.85;
                const x = i * (anchoBarra + espacio);
                ctx.fillRect(x, medioAlto - altoBarra, anchoBarra, altoBarra * 2);
            }
        }

        // ZOOM ENGINE
        function cambiarZoom(delta) {
            const anteriorZoom = currentZoomLevel;
            currentZoomLevel = Math.max(0.1, Math.min(4.0, currentZoomLevel + delta));
            pixelsPerSecond = basePixelsPerSecond * currentZoomLevel;
            txtZoom.innerText = `${Math.round(currentZoomLevel * 100)}%`;
            
            document.documentElement.style.setProperty('--grid-width', `${pixelsPerSecond}px`);
            dibujarReglaDeTiempo();

            blocksList.forEach(b => {
                const tiempoX = b.leftX / (basePixelsPerSecond * anteriorZoom);
                b.leftX = tiempoX * pixelsPerSecond;
                b.domElement.style.width = `${b.audioDuration * pixelsPerSecond}px`;
                b.domElement.style.left = `${b.leftX}px`;
                b.canvasElement.style.width = `${b.audioDuration * pixelsPerSecond}px`;
                renderizarSeccionOndaHD(b);
            });

            reprogramarSecuenciadorGlobal();
            playhead.style.left = `${Tone.Transport.seconds * pixelsPerSecond}px`;
        }

        btnZoomIn.addEventListener('click', () => cambiarZoom(0.1));
        btnZoomOut.addEventListener('click', () => cambiarZoom(-0.1));

        // MOVER LA LÍNEA ROJA (DESDE LA REGLA O EL TIMELINE)
        timelineContainer.addEventListener('mousedown', (e) => {
            if (isDragging) return;
            if (e.target === timelineContainer || e.target === document.getElementById('timeline-stretch') || e.target.parentNode === tracksContainer) {
                deseleccionarTodo();
            }
            isMovingPlayhead = true;
            moverLineaA(e);
        });

        rulerContainer.addEventListener('mousedown', (e) => {
            isMovingPlayhead = true;
            moverLineaA(e);
        });

        function moverLineaA(e) {
            const containerRect = rulerContainer.getBoundingClientRect();
            const clickX = e.clientX - containerRect.left + timelineContainer.scrollLeft;
            const nuevoTiempo = clickX / pixelsPerSecond;

            if (nuevoTiempo < 0) return;

            Tone.Transport.seconds = nuevoTiempo;
            playhead.style.left = `${clickX}px`;

            if (Tone.Transport.state === "started") {
                blocksList.forEach(b => b.player.stop());
                blocksList.forEach(b => {
                    const blockStartTimeline = b.leftX / pixelsPerSecond;
                    const blockEndTimeline = blockStartTimeline + b.audioDuration;
                    if (nuevoTiempo >= blockStartTimeline && nuevoTiempo < blockEndTimeline) {
                        const offsetEnBloque = nuevoTiempo - blockStartTimeline;
                        const offsetRealBuffer = b.audioStart + offsetEnBloque;
                        b.player.start(Tone.now(), offsetRealBuffer, b.audioEnd - offsetRealBuffer);
                    }
                });
            }
        }

        // MOUSEMOVE MOUSEUP
        window.addEventListener('mousemove', (e) => {
            if (isDragging && draggedBlockData) {
                const containerRect = timelineContainer.getBoundingClientRect();
                let newLeft = e.clientX - containerRect.left - startX + timelineContainer.scrollLeft;
                if (newLeft < 0) newLeft = 0;
                
                draggedBlockData.leftX = newLeft;
                draggedBlockData.domElement.style.left = `${newLeft}px`;
                reprogramarSecuenciadorGlobal();
            }
            if (isMovingPlayhead) {
                moverLineaA(e);
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            isMovingPlayhead = false;
            if (draggedBlockData) {
                draggedBlockData.domElement.classList.replace('cursor-grabbing', 'cursor-grab');
                seleccionarBloque(draggedBlockData.id);
                draggedBlockData = null;
            }
        });

        // REPROGRAMAR
        function reprogramarSecuenciadorGlobal() {
            Tone.Transport.cancel();
            blocksList.forEach(b => {
                const tiempoInicioTimeline = b.leftX / pixelsPerSecond;
                Tone.Transport.schedule((time) => {
                    b.player.start(time, b.audioStart, b.audioDuration);
                }, tiempoInicioTimeline);
            });
        }

        function actualizarPlayhead() {
            if (Tone.Transport.state === "started" && !isMovingPlayhead) {
                const currentLeft = Tone.Transport.seconds * pixelsPerSecond;
                playhead.style.left = `${currentLeft}px`;
            }
            requestAnimationFrame(actualizarPlayhead);
        }
        requestAnimationFrame(actualizarPlayhead);

        // TECLADO: CORTAR (C) Y BORRAR (CTRL+X)
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'x') {
                if (selectedBlockId !== null) {
                    e.preventDefault();
                    const index = blocksList.findIndex(b => b.id === selectedBlockId);
                    if (index !== -1) {
                        blocksList[index].player.dispose();
                        blocksList[index].domElement.remove();
                        blocksList.splice(index, 1);
                        selectedBlockId = null;
                        reprogramarSecuenciadorGlobal();
                    }
                }
            }

            if (e.key.toLowerCase() === 'c' && !e.ctrlKey && !e.metaKey) {
                if (selectedBlockId !== null) {
                    const block = blocksList.find(b => b.id === selectedBlockId);
                    if (block) {
                        const tiempoLinea = Tone.Transport.seconds;
                        const inicioBloqueTimeline = block.leftX / pixelsPerSecond;
                        const finBloqueTimeline = inicioBloqueTimeline + block.audioDuration;

                        if (tiempoLinea > inicioBloqueTimeline && tiempoLinea < finBloqueTimeline) {
                            const tiempoDeCorteRelativo = tiempoLinea - inicioBloqueTimeline;
                            const puntoCorteBuffer = block.audioStart + tiempoDeCorteRelativo;

                            const originalEnd = block.audioEnd;
                            const originalLeft = block.leftX;

                            block.audioEnd = puntoCorteBuffer;
                            block.audioDuration = puntoCorteBuffer - block.audioStart;
                            
                            const nuevoAnchoPrimerBloque = block.audioDuration * pixelsPerSecond;
                            block.domElement.style.width = `${nuevoAnchoPrimerBloque}px`;
                            block.canvasElement.style.width = `${nuevoAnchoPrimerBloque}px`;
                            renderizarSeccionOndaHD(block);

                            const nuevoPosX = originalLeft + nuevoAnchoPrimerBloque;
                            crearNuevoBloque(nuevoPosX, puntoCorteBuffer, originalEnd, block.trackId, block.buffer, block.fileName);
                        }
                    }
                }
            }
        });

        // REPRODUCCIÓN
        btnPlay.addEventListener('click', async () => {
            await Tone.start();
            if (Tone.Transport.state !== "started") {
                Tone.Transport.start(Tone.now());
                const tiempoActual = Tone.Transport.seconds;

                blocksList.forEach(b => {
                    const blockStart = b.leftX / pixelsPerSecond;
                    const blockEnd = blockStart + b.audioDuration;
                    if (tiempoActual >= blockStart && tiempoActual < blockEnd) {
                        const offset = tiempoActual - blockStart;
                        const targetBufferStart = b.audioStart + offset;
                        b.player.start(Tone.now(), targetBufferStart, b.audioEnd - targetBufferStart);
                    }
                });

                btnPlay.innerHTML = `<i data-lucide="pause" class="w-4 h-4 text-black fill-black"></i>`;
            } else {
                Tone.Transport.pause();
                blocksList.forEach(b => b.player.stop());
                btnPlay.innerHTML = `<i data-lucide="play" class="w-4 h-4 text-black fill-black"></i>`;
            }
            lucide.createIcons();
        });

        btnRestart.addEventListener('click', () => {
            Tone.Transport.stop();
            blocksList.forEach(b => b.player.stop());
            playhead.style.left = "0px";
            Tone.Transport.seconds = 0;
            timelineContainer.scrollLeft = 0;
            btnPlay.innerHTML = `<i data-lucide="play" class="w-4 h-4 text-black fill-black"></i>`;
            lucide.createIcons();
        });
    </script>
</body>
</html>
