<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Roll DAW - Fixed Window</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .vertical-grid {
            background-size: var(--grid-width, 50px) 100%;
            background-image: linear-gradient(to right, #1f1f23 1px, transparent 1px);
        }
        .custom-scroll::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 0px;
        }
        .track-height {
            height: 64px;
        }
    </style>
</head>
<body class="bg-[#0c0c0e] text-zinc-200 h-screen w-screen overflow-hidden font-sans select-none m-0 p-0 flex items-center justify-center">

    <div class="w-[95vw] h-[85vh] max-w-6xl max-h-[750px] bg-[#060607] border border-zinc-800 rounded-lg shadow-2xl flex flex-col overflow-hidden relative">
        
        <div class="bg-[#121214] border-b border-zinc-900 p-4 flex items-center justify-between gap-4 z-50 shrink-0">
            
            <div class="flex items-center gap-2">
                <button id="btn-restart" class="p-2 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-none transition" title="Reiniciar al inicio">
                    <i data-lucide="rotate-ccw" class="w-4 h-4 text-white"></i>
                </button>
                <button id="btn-play" class="p-2 bg-white hover:bg-zinc-200 text-black rounded-none transition" title="Play / Pause">
                    <i data-lucide="play" class="w-4 h-4 fill-black"></i>
                </button>
                
                <div class="w-[1px] h-6 bg-zinc-800 mx-1"></div>

                <button id="btn-snap" class="p-2 bg-white border border-zinc-700 text-black rounded-none transition flex items-center justify-center gap-1.5" title="Ajustar a la cuadrícula (Snap)">
                    <i data-lucide="magnet" class="w-4 h-4"></i>
                    <span class="text-xs font-mono font-bold hidden sm:inline">SNAP</span>
                </button>
            </div>

            <div class="flex items-center gap-1 bg-zinc-900 p-1 rounded-none border border-zinc-800">
                <button id="btn-zoom-out" class="p-1.5 hover:bg-zinc-800 rounded-none text-zinc-400 hover:text-white transition" title="Alejar Zoom">
                    <i data-lucide="zoom-out" class="w-4 h-4"></i>
                </button>
                <span id="txt-zoom" class="text-[10px] font-mono text-zinc-500 px-1 min-w-[35px] text-center">50%</span>
                <button id="btn-zoom-in" class="p-1.5 hover:bg-zinc-800 rounded-none text-zinc-400 hover:text-white transition" title="Acercar Zoom">
                    <i data-lucide="zoom-in" class="w-4 h-4"></i>
                </button>
            </div>

            <div class="flex items-center gap-3 bg-zinc-900 px-3 py-1.5 rounded-none border border-zinc-800">
                <span class="text-xs font-semibold uppercase tracking-wider text-zinc-500">Tempo</span>
                <input id="input-bpm" type="number" value="120" min="60" max="200" class="w-12 bg-transparent text-white font-mono font-bold focus:outline-none text-center text-md">
                <span class="text-xs text-zinc-600 font-bold">BPM</span>
            </div>

            <div>
                <label for="audio-upload" class="flex items-center gap-2 px-4 py-2 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 hover:border-zinc-700 rounded-none cursor-pointer text-sm font-medium transition text-white">
                    <i data-lucide="upload" class="w-4 h-4"></i>
                    Importar Audio
                </label>
                <input id="audio-upload" type="file" accept="audio/*" class="hidden">
            </div>
        </div>

        <div class="flex-1 flex overflow-hidden relative">
            
            <div class="w-48 bg-[#0f0f11] border-r border-zinc-900 flex flex-col z-40 select-none shrink-0">
                <div class="h-10 border-b border-zinc-900 shrink-0 bg-[#101012]"></div>
                <div id="headers-column" class="flex-1 flex flex-col gap-3 pt-3 overflow-hidden">
                    </div>
            </div>

            <div class="flex-1 flex flex-col overflow-hidden relative">
                
                <div id="ruler-container" class="w-full bg-[#0d0d0f] border-b border-zinc-900 h-10 overflow-hidden relative text-[10px] font-mono select-none">
                    <div id="time-ruler" class="absolute inset-y-0 left-0 w-[60000px] h-full relative"></div>
                </div>

                <div class="flex-1 relative bg-[#060607] overflow-auto vertical-grid custom-scroll" id="timeline-container">
                    
                    <div id="timeline-stretch" class="absolute inset-y-0 left-0 w-[60000px] pointer-events-none">
                        <div id="playhead" class="absolute top-0 bottom-0 w-[1.5px] bg-white shadow-[0_0_8px_rgba(255,255,255,0.8)] z-30 left-0"></div>
                    </div>

                    <div id="tracks-container" class="absolute top-0 left-0 w-[60000px] flex flex-col pt-3 gap-3 pointer-events-none">
                        </div>
                </div>
                
            </div>
        </div>
    </div>

    <script>
        Tone.getContext().lookAhead = 0; 
        Tone.getContext().latencyHint = "interactive";

        lucide.createIcons();

        const btnPlay = document.getElementById('btn-play');
        const btnRestart = document.getElementById('btn-restart');
        const btnSnap = document.getElementById('btn-snap');
        const btnZoomIn = document.getElementById('btn-zoom-in');
        const btnZoomOut = document.getElementById('btn-zoom-out');
        const txtZoom = document.getElementById('txt-zoom');
        const inputBpm = document.getElementById('input-bpm');
        const audioUpload = document.getElementById('audio-upload');
        const timeRuler = document.getElementById('time-ruler');
        const headersColumn = document.getElementById('headers-column');
        const tracksContainer = document.getElementById('tracks-container');
        const playhead = document.getElementById('playhead');
        const timelineContainer = document.getElementById('timeline-container');
        const rulerContainer = document.getElementById('ruler-container');

        let tracksList = []; 
        let blocksList = []; 
        let selectedBlockIds = []; 
        let blockIdCounter = 0;
        let trackIdCounter = 0;
        let copiedBlockData = null;
        let isDragging = false;
        let isMovingPlayhead = false;
        let startX = 0;
        let draggedBlockData = null;
        
        let isSnapActive = true; 
        let currentZoomLevel = 0.5; 
        const basePixelsPerSecond = 100;
        let pixelsPerSecond = basePixelsPerSecond * currentZoomLevel;

        document.documentElement.style.setProperty('--grid-width', `${pixelsPerSecond}px`);

        // MENÚ CONTEXTUAL PROFESIONAL EN EL DOM
        const menuContextual = document.createElement('div');
        menuContextual.id = 'menu-contextual-bloque';
        menuContextual.className = 'hidden absolute bg-[#0e0e10] border border-zinc-800 p-4 rounded-md shadow-2xl z-50 w-64 text-zinc-300 font-mono text-xs flex flex-col gap-4';
        document.body.appendChild(menuContextual);

        document.addEventListener('click', (e) => {
            if (!menuContextual.contains(e.target)) {
                menuContextual.classList.add('hidden');
            }
        });

        btnSnap.addEventListener('click', () => {
            isSnapActive = !isSnapActive;
            if (isSnapActive) {
                btnSnap.className = "p-2 bg-white border border-zinc-700 text-black rounded-none transition flex items-center justify-center gap-1.5";
            } else {
                btnSnap.className = "p-2 bg-zinc-900 border border-zinc-800 text-zinc-400 hover:text-white rounded-none transition flex items-center justify-center gap-1.5";
            }
        });

        timelineContainer.addEventListener('scroll', () => {
            rulerContainer.scrollLeft = timelineContainer.scrollLeft;
            headersColumn.scrollTop = timelineContainer.scrollTop;
        });

        inputBpm.addEventListener('change', (e) => {
            let bpm = Math.max(60, Math.min(200, Number(e.target.value)));
            e.target.value = bpm;
            Tone.Transport.bpm.value = bpm;
            
            // Sincronización del warp de tempo global
            const factorVelocidadGlobal = bpm / 120; 
            blocksList.forEach(b => {
                if (b.player) {
                    b.player.playbackRate = b.playbackRate * factorVelocidadGlobal;
                }
            });
        });

        function dibujarReglaDeTiempo() {
            timeRuler.innerHTML = '';
            for (let i = 0; i < 200; i++) {
                const mainX = i * pixelsPerSecond;
                const marker = document.createElement('div');
                marker.className = "absolute top-0 bottom-0 border-l border-white/40 flex flex-col justify-between pl-1 pb-0.5";
                marker.style.left = `${mainX}px`;
                
                const numSpan = document.createElement('span');
                numSpan.className = "text-[10px] font-bold text-white pt-1 font-mono";
                numSpan.innerText = i + 1;
                marker.appendChild(numSpan);
                timeRuler.appendChild(marker);

                const subDivisions = 4;
                for (let s = 1; s < subDivisions; s++) {
                    const subX = mainX + (s * (pixelsPerSecond / subDivisions));
                    const subTick = document.createElement('div');
                    subTick.className = "absolute bottom-0 border-l border-zinc-800 h-1.5";
                    subTick.style.left = `${subX}px`;
                    timeRuler.appendChild(subTick);
                }
            }
        }
        dibujarReglaDeTiempo();

        audioUpload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const freshBuffer = await Tone.getContext().decodeAudioData(arrayBuffer);
                const fileName = file.name.toUpperCase();

                const trackId = trackIdCounter++;
                const numeroTrack = tracksList.length + 1;

                const headerDiv = document.createElement('div');
                headerDiv.className = "w-full track-height bg-[#141416] border-y border-zinc-900 px-3 flex flex-col justify-center gap-1 text-[11px] font-mono shrink-0";
                headerDiv.setAttribute('data-header-id', trackId);
                
                headerDiv.innerHTML = `
                    <div class="flex items-center justify-between">
                        <span class="text-zinc-400 font-bold tracking-wide">TRACK ${numeroTrack}</span>
                        <button class="btn-mute w-5 h-5 bg-zinc-800 border border-zinc-700 text-[10px] font-extrabold flex items-center justify-center hover:bg-zinc-700 transition text-zinc-400" data-track-id="${trackId}">M</button>
                    </div>
                    <div class="flex items-center gap-2">
                        <i data-lucide="volume-2" class="w-3 h-3 text-zinc-500"></i>
                        <input type="range" min="0" max="1" step="0.01" value="0.8" class="slider-volume w-full accent-white bg-zinc-800 h-1 appearance-none cursor-pointer" data-track-id="${trackId}">
                    </div>
                `;
                headersColumn.appendChild(headerDiv);
                lucide.createIcons();

                const channelVolumeNode = new Tone.Volume(-2).toDestination();

                const trackRow = document.createElement('div');
                trackRow.className = "w-full track-height bg-zinc-950/20 border-y border-zinc-900/40 relative pointer-events-auto shrink-0";
                trackRow.setAttribute('data-track-id', trackId);
                tracksContainer.appendChild(trackRow);
                
                tracksList.push({ 
                    id: trackId, 
                    domRow: trackRow, 
                    domHeader: headerDiv,
                    volumeNode: channelVolumeNode,
                    isMuted: false,
                    volumeValue: 0.8
                });

                configurarEventosHeader(trackId);
                crearNuevoBloque(0, 0, freshBuffer.duration, trackId, freshBuffer, fileName);
                audioUpload.value = '';
            } catch (error) {
                console.error("Error cargando el archivo:", error);
            }
        });

        function configurarEventosHeader(trackId) {
            const trackData = tracksList.find(t => t.id === trackId);
            if (!trackData) return;

            const headerDom = trackData.domHeader;
            const muteBtn = headerDom.querySelector('.btn-mute');
            const volumeSlider = headerDom.querySelector('.slider-volume');

            muteBtn.addEventListener('click', () => {
                trackData.isMuted = !trackData.isMuted;
                if (trackData.isMuted) {
                    trackData.volumeNode.mute = true;
                    muteBtn.className = "btn-mute w-5 h-5 bg-red-600 border border-red-500 text-[10px] font-extrabold flex items-center justify-center text-white";
                } else {
                    trackData.volumeNode.mute = false;
                    muteBtn.className = "btn-mute w-5 h-5 bg-zinc-800 border border-zinc-700 text-[10px] font-extrabold flex items-center justify-center hover:bg-zinc-700 transition text-zinc-400";
                }
            });

            volumeSlider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                trackData.volumeValue = val;
                if (val === 0) {
                    trackData.volumeNode.volume.value = -Infinity;
                } else {
                    trackData.volumeNode.volume.value = Tone.gainToDb(val);
                }
            });
        }

        function crearNuevoBloque(posX, startTime, endTime, trackId, buffer, name, presetEffects = null) {
            const id = blockIdCounter++;
            const duration = endTime - startTime;
            const blockWidth = duration * pixelsPerSecond;

            const dom = document.createElement('div');
            dom.className = "absolute top-0 h-full bg-[#121214] border border-zinc-800 rounded-none shadow-md cursor-grab flex flex-col justify-between overflow-hidden z-20";
            dom.style.width = `${blockWidth}px`;
            dom.style.left = `${posX}px`;
            dom.setAttribute('data-id', id);

            const canvas = document.createElement('canvas');
            canvas.className = "absolute inset-0 w-full h-full opacity-90 pointer-events-none";
            
            const label = document.createElement('div');
            label.className = "relative z-10 p-1 text-[8px] font-mono tracking-wider text-zinc-400 bg-black/40 flex items-center gap-1 border-b border-zinc-900/40 backdrop-blur-sm pointer-events-none truncate";
            label.innerHTML = `<i data-lucide="music" class="w-2.5 h-2.5 text-white"></i> ${name}`;

            dom.appendChild(canvas);
            dom.appendChild(label);
            
            const targetTrack = tracksList.find(t => t.id === trackId);
            if (targetTrack) {
                targetTrack.domRow.appendChild(dom);
            }
            lucide.createIcons();

            // === CADENA DE AUDIO PROFESIONAL (GRAIN PLAYER + PITCH SHIFT ESTUDIO) ===
            const blockVolumeNode = new Tone.Volume(presetEffects ? presetEffects.volume : 0);
            
            // Configuramos un PitchShift optimizado de baja latencia con ventana pro de 0.1s
            const pitchShiftNode = new Tone.PitchShift({
                pitch: presetEffects ? presetEffects.pitch : 0,
                windowSize: 0.1,
                feedback: 0
            });
            
            pitchShiftNode.connect(blockVolumeNode);
            blockVolumeNode.connect(targetTrack.volumeNode);

            // GrainPlayer nos da Time-Stretching cristalino e independiente de tono
            const player = new Tone.GrainPlayer({
                url: buffer,
                overlap: 0.1,
                grainSize: 0.08,
                loop: false
            });
            player.connect(pitchShiftNode);

            if (presetEffects) {
                player.playbackRate = presetEffects.playbackRate;
                player.reverse = presetEffects.reverse;
            }

            const blockObject = {
                id: id,
                trackId: trackId,
                domElement: dom,
                canvasElement: canvas,
                player: player,
                pitchShift: pitchShiftNode,
                blockVolume: blockVolumeNode,
                buffer: buffer,
                fileName: name,
                leftX: posX,
                audioStart: startTime,
                audioEnd: endTime,
                audioDuration: duration,
                pitch: presetEffects ? presetEffects.pitch : 0,
                playbackRate: presetEffects ? presetEffects.playbackRate : 1.0,
                reverse: presetEffects ? presetEffects.reverse : false,
                volume: presetEffects ? presetEffects.volume : 0
            };

            blocksList.push(blockObject);

            dom.addEventListener('mousedown', (e) => {
                if (e.button === 2) return; 
                seleccionarBloque(id, e.shiftKey); 
                
                isDragging = true;
                dom.classList.replace('cursor-grab', 'cursor-grabbing');
                
                const rect = dom.getBoundingClientRect();
                startX = e.clientX - rect.left;
                draggedBlockData = blockObject;
                e.stopPropagation(); 
            });

            dom.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                e.stopPropagation();
                seleccionarBloque(id, false);
                mostrarMenuContextual(blockObject, e.clientX, e.clientY);
            });

            canvas.style.width = `${blockWidth}px`;
            requestAnimationFrame(() => {
                renderizarSeccionOndaHD(blockObject);
            });

            reprogramarSecuenciadorGlobal();
            seleccionarBloque(id);
        }

        // CONTROL CONTEXTUAL DE GRADO DE ESTUDIO
        function mostrarMenuContextual(block, x, y) {
            menuContextual.innerHTML = `
                <div class="flex items-center justify-between border-b border-zinc-800 pb-2 mb-1">
                    <span class="font-bold text-white truncate max-w-[150px] tracking-tight">${block.fileName}</span>
                    <span class="text-[9px] text-emerald-400 font-bold font-mono tracking-widest">DSP PRO</span>
                </div>
                
                <!-- PITCH SHIFT DE PRECISIÓN -->
                <div class="flex flex-col gap-1">
                    <div class="flex justify-between text-[10px]">
                        <span class="text-zinc-400 tracking-tight">PITCH (TONO)</span>
                        <span id="ctx-pitch-val" class="font-bold text-emerald-400">${block.pitch > 0 ? '+' : ''}${block.pitch} semitones</span>
                    </div>
                    <input id="ctx-pitch" type="range" min="-12" max="12" step="1" value="${block.pitch}" class="w-full accent-white bg-zinc-800 h-1 appearance-none cursor-pointer">
                </div>

                <!-- TIME STRETCHING CRISTALINO -->
                <div class="flex flex-col gap-1">
                    <div class="flex justify-between text-[10px]">
                        <span class="text-zinc-400 tracking-tight">VELOCIDAD</span>
                        <span id="ctx-rate-val" class="font-bold text-emerald-400">${block.playbackRate.toFixed(2)}x</span>
                    </div>
                    <input id="ctx-rate" type="range" min="0.25" max="3.0" step="0.05" value="${block.playbackRate}" class="w-full accent-white bg-zinc-800 h-1 appearance-none cursor-pointer">
                </div>

                <!-- GANANCIA LIMPIA -->
                <div class="flex flex-col gap-1">
                    <div class="flex justify-between text-[10px]">
                        <span class="text-zinc-400 tracking-tight">VOLUMEN</span>
                        <span id="ctx-vol-val" class="font-bold text-emerald-400">${block.volume > 0 ? '+' : ''}${block.volume} dB</span>
                    </div>
                    <input id="ctx-vol" type="range" min="-30" max="12" step="1" value="${block.volume}" class="w-full accent-white bg-zinc-800 h-1 appearance-none cursor-pointer">
                </div>

                <!-- REVERSA COMPACTA -->
                <div class="flex items-center justify-between bg-zinc-900/40 p-2 border border-zinc-800 rounded">
                    <span class="text-zinc-400 font-bold tracking-tight">REVERSA</span>
                    <button id="ctx-reverse" class="px-4 py-1 text-[10px] font-bold rounded border transition-all ${block.reverse ? 'bg-emerald-500 text-black border-emerald-400 font-extrabold' : 'bg-zinc-850 text-zinc-400 border-zinc-700 hover:text-white'}">
                        ${block.reverse ? 'SÍ' : 'NO'}
                    </button>
                </div>
            `;

            // Calcular colisiones con los bordes de la pantalla para posicionar el menú
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            let posX = x;
            let posY = y;

            if (x + 260 > screenWidth) posX = screenWidth - 270;
            if (y + 260 > screenHeight) posY = screenHeight - 270;

            menuContextual.style.left = `${posX}px`;
            menuContextual.style.top = `${posY}px`;
            menuContextual.classList.remove('hidden');

            const pitchInput = document.getElementById('ctx-pitch');
            const pitchVal = document.getElementById('ctx-pitch-val');
            pitchInput.addEventListener('input', (e) => {
                const val = parseInt(e.target.value);
                block.pitch = val;
                block.pitchShift.pitch = val;
                pitchVal.innerText = `${val > 0 ? '+' : ''}${val} semitones`;
            });

            const rateInput = document.getElementById('ctx-rate');
            const rateVal = document.getElementById('ctx-rate-val');
            rateInput.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                block.playbackRate = val;
                
                const factorBpmGlobal = Number(inputBpm.value) / 120;
                block.player.playbackRate = val * factorBpmGlobal;
                rateVal.innerText = `${val.toFixed(2)}x`;
            });

            const volInput = document.getElementById('ctx-vol');
            const volVal = document.getElementById('ctx-vol-val');
            volInput.addEventListener('input', (e) => {
                const val = parseInt(e.target.value);
                block.volume = val;
                block.blockVolume.volume.value = val;
                volVal.innerText = `${val > 0 ? '+' : ''}${val} dB`;
            });

            const reverseBtn = document.getElementById('ctx-reverse');
            reverseBtn.addEventListener('click', () => {
                block.reverse = !block.reverse;
                block.player.reverse = block.reverse;
                
                if (block.reverse) {
                    reverseBtn.className = "px-4 py-1 text-[10px] font-bold rounded border transition-all bg-emerald-500 text-black border-emerald-400 font-extrabold";
                    reverseBtn.innerText = "SÍ";
                } else {
                    reverseBtn.className = "px-4 py-1 text-[10px] font-bold rounded border transition-all bg-zinc-850 text-zinc-400 border-zinc-700 hover:text-white";
                    reverseBtn.innerText = "NO";
                }
                
                renderizarSeccionOndaHD(block);
            });
        }

        function seleccionarBloque(id, shiftKey = false) {
            if (shiftKey) {
                if (selectedBlockIds.includes(id)) {
                    selectedBlockIds = selectedBlockIds.filter(bId => bId !== id);
                } else {
                    selectedBlockIds.push(id);
                }
            } else {
                selectedBlockIds = [id];
            }

            blocksList.forEach(b => {
                if (selectedBlockIds.includes(b.id)) {
                    b.domElement.classList.remove('border-zinc-800');
                    b.domElement.classList.add('border-emerald-500', 'shadow-[0_0_15px_rgba(16,185,129,0.15)]');
                } else {
                    b.domElement.classList.remove('border-emerald-500', 'shadow-[0_0_15px_rgba(16,185,129,0.15)]');
                    b.domElement.classList.add('border-zinc-800');
                }
            });
        }

        function deseleccionarTodo() {
            selectedBlockIds = [];
            blocksList.forEach(b => {
                b.domElement.classList.remove('border-emerald-500', 'shadow-[0_0_15px_rgba(16,185,129,0.15)]');
                b.domElement.classList.add('border-zinc-800');
            });
        }

        function renderizarSeccionOndaHD(block) {
            const canvas = block.canvasElement;
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const width = block.audioDuration * pixelsPerSecond;
            const altoLienzo = 64;

            canvas.width = width * dpr;
            canvas.height = altoLienzo * dpr;
            ctx.scale(dpr, dpr);

            const datosAudio = block.buffer.getChannelData(0);
            const totalMuestrasGlobales = datosAudio.length;

            const muestraInicio = Math.floor((block.audioStart / block.buffer.duration) * totalMuestrasGlobales);
            const muestraFin = Math.floor((block.audioEnd / block.buffer.duration) * totalMuestrasGlobales);
            const totalMuestrasBloque = muestraFin - muestraInicio;

            const anchoBarra = 2;
            const espacio = 1;
            const totalBarras = Math.floor(width / (anchoBarra + espacio));
            const pasoMuestra = Math.floor(totalMuestrasBloque / totalBarras) || 1;
            const medioAlto = altoLienzo / 2;

            ctx.clearRect(0, 0, width, altoLienzo);
            
            // Color verde esmeralda dinámico para denotar el audio modificado en reversa
            ctx.fillStyle = block.reverse ? '#10b981' : '#ffffff'; 

            for (let i = 0; i < totalBarras; i++) {
                let indiceBarra = block.reverse ? (totalBarras - 1 - i) : i;
                let inicioMuestra = indiceBarra * pasoMuestra + muestraInicio;
                let maximoValor = 0;
                
                for (let j = 0; j < pasoMuestra; j++) {
                    if (inicioMuestra + j >= totalMuestrasGlobales) break;
                    const valorActual = Math.abs(datosAudio[inicioMuestra + j]);
                    if (valorActual > maximoValor) maximoValor = valorActual;
                }

                const altoBarra = maximoValor * medioAlto * 0.85;
                const x = i * (anchoBarra + espacio);
                ctx.fillRect(x, medioAlto - altoBarra, anchoBarra, altoBarra * 2);
            }
        }

        function cambiarZoom(delta) {
            const anteriorZoom = currentZoomLevel;
            currentZoomLevel = Math.max(0.1, Math.min(4.0, currentZoomLevel + delta));
            pixelsPerSecond = basePixelsPerSecond * currentZoomLevel;
            txtZoom.innerText = `${Math.round(currentZoomLevel * 100)}%`;
            
            document.documentElement.style.setProperty('--grid-width', `${pixelsPerSecond}px`);
            dibujarReglaDeTiempo();

            blocksList.forEach(b => {
                const tiempoX = b.leftX / (basePixelsPerSecond * anteriorZoom);
                b.leftX = tiempoX * pixelsPerSecond;
                b.domElement.style.width = `${b.audioDuration * pixelsPerSecond}px`;
                b.domElement.style.left = `${b.leftX}px`;
                b.canvasElement.style.width = `${b.audioDuration * pixelsPerSecond}px`;
                renderizarSeccionOndaHD(b);
            });

            reprogramarSecuenciadorGlobal();
            playhead.style.left = `${Tone.Transport.seconds * pixelsPerSecond}px`;
        }

        btnZoomIn.addEventListener('click', () => cambiarZoom(0.1));
        btnZoomOut.addEventListener('click', () => cambiarZoom(-0.1));

        timelineContainer.addEventListener('mousedown', (e) => {
            if (isDragging) return;
            const rect = timelineContainer.getBoundingClientRect();
            const clickYDentroDelDiv = e.clientY - rect.top;
            
            if (clickYDentroDelDiv >= timelineContainer.clientHeight) {
                return; 
            }

            if (e.target === timelineContainer || e.target === document.getElementById('timeline-stretch') || e.target.parentNode === tracksContainer) {
                deseleccionarTodo();
            }
            
            isMovingPlayhead = true;
            moverLineaA(e);
        });

        rulerContainer.addEventListener('mousedown', (e) => {
            isMovingPlayhead = true;
            moverLineaA(e);
        });

        function moverLineaA(e) {
            const containerRect = rulerContainer.getBoundingClientRect();
            let clickX = e.clientX - containerRect.left + timelineContainer.scrollLeft;
            
            if (isSnapActive) {
                const subDivisiones = 4;
                const fraccionPxl = pixelsPerSecond / subDivisiones;
                const lineaMasCercana = Math.round(clickX / fraccionPxl);
                clickX = lineaMasCercana * fraccionPxl;
            }

            const nuevoTiempo = clickX / pixelsPerSecond;
            if (nuevoTiempo < 0) return;

            Tone.Transport.seconds = nuevoTiempo;
            playhead.style.left = `${clickX}px`;

            if (Tone.Transport.state === "started") {
                blocksList.forEach(b => b.player.stop());
                blocksList.forEach(b => {
                    const blockStartTimeline = b.leftX / pixelsPerSecond;
                    const blockEndTimeline = blockStartTimeline + b.audioDuration;
                    if (nuevoTiempo >= blockStartTimeline && nuevoTiempo < blockEndTimeline) {
                        const offsetEnBloque = nuevoTiempo - blockStartTimeline;
                        const offsetRealBuffer = b.audioStart + offsetEnBloque;
                        b.player.start(Tone.now(), offsetRealBuffer, b.audioEnd - offsetRealBuffer);
                    }
                });
            }
        }

        window.addEventListener('mousemove', (e) => {
            if (isDragging && draggedBlockData) {
                const containerRect = timelineContainer.getBoundingClientRect();
                let newLeft = e.clientX - containerRect.left - startX + timelineContainer.scrollLeft;
                if (newLeft < 0) newLeft = 0;
                
                if (isSnapActive) {
                    const subDivisiones = 4;
                    const fraccionPxl = pixelsPerSecond / subDivisiones;
                    const snapX = Math.round(newLeft / fraccionPxl) * fraccionPxl;
                    if (Math.abs(newLeft - snapX) < (fraccionPxl * 0.4)) {
                        newLeft = snapX;
                    }
                }
                
                draggedBlockData.leftX = newLeft;
                draggedBlockData.domElement.style.left = `${newLeft}px`;
                reprogramarSecuenciadorGlobal();
            }
            if (isMovingPlayhead) {
                moverLineaA(e);
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            isMovingPlayhead = false;
            if (draggedBlockData) {
                draggedBlockData.domElement.classList.replace('cursor-grabbing', 'cursor-grab');
                seleccionarBloque(draggedBlockData.id);
                draggedBlockData = null;
            }
        });

        function reprogramarSecuenciadorGlobal() {
            Tone.Transport.cancel();
            blocksList.forEach(b => {
                const tiempoInicioTimeline = b.leftX / pixelsPerSecond;
                Tone.Transport.schedule((time) => {
                    b.player.start(time, b.audioStart, b.audioDuration);
                }, tiempoInicioTimeline);
            });
        }

        function actualizarPlayhead() {
            if (Tone.Transport.state === "started" && !isMovingPlayhead) {
                const currentLeft = Tone.Transport.seconds * pixelsPerSecond;
                playhead.style.left = `${currentLeft}px`;
            }
            requestAnimationFrame(actualizarPlayhead);
        }
        requestAnimationFrame(actualizarPlayhead);

        // ATAJOS DE TECLADO
        window.addEventListener('keydown', (e) => {
            const isModifier = e.ctrlKey || e.metaKey;

            // 1. BORRAR BLOQUE (Ctrl + X)
            if (isModifier && e.key.toLowerCase() === 'x') {
                if (selectedBlockIds.length > 0) {
                    e.preventDefault();
                    const idsParaBorrar = [...selectedBlockIds];

                    idsParaBorrar.forEach(idAEliminar => {
                        const index = blocksList.findIndex(b => b.id === idAEliminar);
                        if (index !== -1) {
                            const trackIdAsociado = blocksList[index].trackId;
                            
                            blocksList[index].player.dispose();
                            blocksList[index].pitchShift.dispose();
                            blocksList[index].blockVolume.dispose();
                            blocksList[index].domElement.remove();
                            blocksList.splice(index, 1);

                            const quedanBloquesEnTrack = blocksList.some(b => b.trackId === trackIdAsociado);
                            if (!quedanBloquesEnTrack) {
                                const tIndex = tracksList.findIndex(t => t.id === trackIdAsociado);
                                if (tIndex !== -1) {
                                    tracksList[tIndex].volumeNode.dispose();
                                    tracksList[tIndex].domRow.remove(); 
                                    tracksList[tIndex].domHeader.remove(); 
                                    tracksList.splice(tIndex, 1); 
                                    
                                    tracksList.forEach((t, idx) => {
                                        const spanLabel = t.domHeader.querySelector('span');
                                        if (spanLabel) spanLabel.innerText = `TRACK ${idx + 1}`;
                                    });
                                }
                            }
                        }
                    });
                    deseleccionarTodo();
                    reprogramarSecuenciadorGlobal();
                }
            }

            // 2. COPIAR BLOQUE (Ctrl + C)
            if (isModifier && e.key.toLowerCase() === 'c') {
                if (selectedBlockIds.length > 0) {
                    e.preventDefault();
                    const ultimoId = selectedBlockIds[selectedBlockIds.length - 1];
                    const block = blocksList.find(b => b.id === ultimoId);
                    if (block) {
                        copiedBlockData = block;
                        console.log("Bloque copiado:", block.fileName);
                    }
                }
            }

            // 3. PEGAR BLOQUE (Ctrl + V)
            if (isModifier && e.key.toLowerCase() === 'v') {
                if (copiedBlockData !== null) {
                    e.preventDefault();
                    
                    const tiempoActual = Tone.Transport.seconds;
                    let posX = tiempoActual * pixelsPerSecond;

                    if (isSnapActive) {
                        const subDivisiones = 4;
                        const fraccionPxl = pixelsPerSecond / subDivisiones;
                        posX = Math.round(posX / fraccionPxl) * fraccionPxl;
                    }

                    const presetEffects = {
                        pitch: copiedBlockData.pitch,
                        playbackRate: copiedBlockData.playbackRate,
                        reverse: copiedBlockData.reverse,
                        volume: copiedBlockData.volume
                    };

                    crearNuevoBloque(
                        posX, 
                        copiedBlockData.audioStart, 
                        copiedBlockData.audioEnd, 
                        copiedBlockData.trackId, 
                        copiedBlockData.buffer, 
                        copiedBlockData.fileName,
                        presetEffects
                    );
                }
            }

            // 4. CORTAR BLOQUE (Tecla C sola)
            if (e.key.toLowerCase() === 'c' && !e.ctrlKey && !e.metaKey) {
                if (selectedBlockIds.length > 0) {
                    const ultimoId = selectedBlockIds[selectedBlockIds.length - 1];
                    const block = blocksList.find(b => b.id === ultimoId);
                    if (block) {
                        const tiempoLinea = Tone.Transport.seconds;
                        const inicioBloqueTimeline = block.leftX / pixelsPerSecond;
                        const finBloqueTimeline = inicioBloqueTimeline + block.audioDuration;

                        if (tiempoLinea > inicioBloqueTimeline && tiempoLinea < finBloqueTimeline) {
                            const tiempoDeCorteRelativo = tiempoLinea - inicioBloqueTimeline;
                            const puntoCorteBuffer = block.audioStart + tiempoDeCorteRelativo;

                            const originalEnd = block.audioEnd;
                            const originalLeft = block.leftX;

                            block.audioEnd = puntoCorteBuffer;
                            block.audioDuration = puntoCorteBuffer - block.audioStart;
                            
                            const nuevoAnchoPrimerBloque = block.audioDuration * pixelsPerSecond;
                            block.domElement.style.width = `${nuevoAnchoPrimerBloque}px`;
                            block.canvasElement.style.width = `${nuevoAnchoPrimerBloque}px`;
                            renderizarSeccionOndaHD(block);

                            const nuevoPosX = originalLeft + nuevoAnchoPrimerBloque;

                            const presetEffects = {
                                pitch: block.pitch,
                                playbackRate: block.playbackRate,
                                reverse: block.reverse,
                                volume: block.volume
                            };

                            crearNuevoBloque(nuevoPosX, puntoCorteBuffer, originalEnd, block.trackId, block.buffer, block.fileName, presetEffects);
                        }
                    }
                }
            }
        });

        btnPlay.addEventListener('click', async () => {
            await Tone.start();
            if (Tone.Transport.state !== "started") {
                Tone.Transport.start(Tone.now());
                const tiempoActual = Tone.Transport.seconds;

                blocksList.forEach(b => {
                    const blockStart = b.leftX / pixelsPerSecond;
                    const blockEnd = blockStart + b.audioDuration;
                    if (tiempoActual >= blockStart && tiempoActual < blockEnd) {
                        const offset = tiempoActual - blockStart;
                        const targetBufferStart = b.audioStart + offset;
                        b.player.start(Tone.now(), targetBufferStart, b.audioEnd - targetBufferStart);
                    }
                });

                btnPlay.innerHTML = `<i data-lucide="pause" class="w-4 h-4 text-black fill-black"></i>`;
            } else {
                Tone.Transport.pause();
                blocksList.forEach(b => b.player.stop());
                btnPlay.innerHTML = `<i data-lucide="play" class="w-4 h-4 text-black fill-black"></i>`;
            }
            lucide.createIcons();
        });

        btnRestart.addEventListener('click', () => {
            Tone.Transport.stop();
            blocksList.forEach(b => b.player.stop());
            playhead.style.left = "0px";
            Tone.Transport.seconds = 0;
            timelineContainer.scrollLeft = 0;
            btnPlay.innerHTML = `<i data-lucide="play" class="w-4 h-4 text-black fill-black"></i>`;
            lucide.createIcons();
        });
    </script>
</body>
</html>
